<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vikash Gupta</title>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    
    <link rel="icon" type="image/jpeg" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhmas2eCAoynn3zl-SEZKz0ty4CZzjRc6YFWDC83evpYp_Bz6AlEzJwn0cV4Z4iPBYIZGiR6v-IY0jea0qGchGR5TYKZv7KNg0mI23bLJL752Sp_pSQa4d63blnCZIhI4u7gsYu8m6zTf0c1QNf1IV799AjXCTdmjo4D_KWCr_CdZtG2uZtBDA08tfSTms/s32/photostudio_1777473354740.jpg">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>

    <style>
    /* --- CSS STYLES --- */
    body {
        font-family: 'Inter', 'Segoe UI', Helvetica, sans-serif;
        background-color: #f3f4f6; /* Global Background */
        margin: 0;
        padding: 0;
        color: #1f2937;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh; 
    }

    /* CARD CONTAINER */
    .card {
        background: #ffffff;
        width: 90%;
        max-width: 450px;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        border: 1px solid #e5e7eb;
        margin: 20px auto;
    }

    /* NAME TITLE */
    h1.profile-name {
        margin: 0 0 20px 0;
        font-size: 2.2em;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #4f46e5; /* VG Primary */
        font-weight: 800;
        line-height: 1.2;
    }

    /* PROFILE PICTURE */
    .profile-pic {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #eef2ff;
        box-shadow: 0 4px 15px rgba(79, 70, 229, 0.15);
        margin-bottom: 25px;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    /* INFO ROWS */
    .info-row {
        margin-bottom: 12px;
        font-size: 1.1em;
        color: #4b5563;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    .info-row i {
        color: #4f46e5; 
        width: 20px;
    }

    /* SECTION TITLES */
    .section-header {
        text-transform: uppercase;
        font-size: 0.85em;
        color: #6b7280;
        letter-spacing: 1.5px;
        margin: 25px 0 12px 0;
        font-weight: 700;
    }

    /* BUTTONS GENERAL */
    .links-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .btn {
        display: block;
        padding: 14px;
        text-decoration: none;
        color: white;
        border-radius: 10px;
        font-weight: 700;
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    .btn:hover {
        transform: translateY(-2px);
        opacity: 0.95;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* --- WEBSITE BUTTON COLORS --- */
    
    /* VG Live Tools (Indigo) */
    .btn-tools {
        background: #4f46e5; 
        border: 1px solid #4338ca;
    }

    /* VG Live TV (Red - Standard Live TV Color) */
    .btn-tv {
        background: #dc2626; /* Red for TV Brand */
        border: 1px solid #b91c1c;
    }

    /* SOCIAL COLORS */
    .instagram { background: #E1306C; }
    .facebook { background: #1877f2; }
    .twitter-x { background: #000000; } 
    </style>
</head>

<body>
    <div class="card">
        <h1 class="profile-name">VIKASH GUPTA</h1>

        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj06jE_vmyMicKIXOp1BYw6IYWRaQ-WTmDZZWyBteJ68QQmzp5Dkk9VuFmUHT83a9JE7NvYK9NvnbqrVSOfTCQnBClcsU4gIGhAAW83wwMo7ZZox-iTODveE-lWlNTjj8KkUPffDzA0QwdQeMnOoOt8p6Mt8oVk_CUASUNrtU2bV-HjCl9EdWoOaLg9Bpjo/s531/VG%20JPG.jpg" alt="Vikash Gupta" class="profile-pic" />

        <div class="info-row">
            <i class="fas fa-map-marker-alt"></i>
            <span>Mumbai, India</span>
        </div>

        <div class="info-row">
            <i class="fas fa-envelope"></i>
            <span>peoplesvikashgupta@gmail.com</span>
        </div>

        <hr style="border:0; border-top:1px solid #e5e7eb; margin: 25px 0 15px 0;" />

        <div class="section-header">My Websites</div>
        <div class="links-container">
            <a href="http://www.vglivetools.blogspot.com" target="_blank" class="btn btn-tools">
                <i class="fas fa-layer-group"></i> VG Live Tools
            </a>
            
            <a href="https://vgtv.pages.dev/" target="_blank" class="btn btn-tv">
                <i class="fa-solid fa-tv"></i> VG TV
            </a>
        </div>

        <div class="section-header">Social Media</div>
        <div class="links-container">
            <a href="https://www.instagram.com/peoplesvikashgupta" target="_blank" class="btn instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            
            <a href="https://www.facebook.com/peoplesvikashgupta" target="_blank" class="btn facebook">
                <i class="fab fa-facebook"></i> Facebook
            </a>

            <a href="https://www.x.com/peoplesvikash" target="_blank" class="btn twitter-x">
                <i class="fa-brands fa-x-twitter"></i> X
            </a>
        </div>
    </div>
</body>
</html>
